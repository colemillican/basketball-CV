video:
  source: 0
  width: 1280
  height: 720
  fps: 60          # request MJPEG + 60fps from camera; use 120 if shooting at 640x480
  rim_source: 0
  rim_width: 1280
  rim_height: 720
  rim_fps: 60
  wide_source: 1
  wide_width: 1280
  wide_height: 720
  wide_fps: 60

detector:
  backend: yolo
  model_path: yolov8n.engine
  confidence: 0.25          # lowered for top-down view; YOLO not trained on this angle
  ball_class_ids: [32]
  max_detections: 3
  use_motion_mask: true     # BGS suppresses stationary objects (rim, floor markings)
  rim_exclusion_scale: 0.0  # disabled — motion mask handles static rim
  motion_overlap_threshold: 5.0   # lowered — small fast ball can fail at 10.0

tracking:
  max_distance_px: 80
  max_missed_frames: 20

shot_logic:
  rim_radius_px: 42
  score_cooldown_frames: 15
  make_confirm_frames: 1
  miss_timeout_frames: 55
  # --- Top-down backboard camera geometry ---
  # Camera is mounted flush behind backboard, angled downward.
  # Ball approaches rim from below in the frame (large y → small y).
  # Arc appears flat in pixel space; drop margin and lane tuned accordingly.
  min_shot_arc_drop_px: 8    # was 28 — top-down arcs show very little y-drop in pixels
  entry_above_margin_px: -55 # was 8  — fires when ball is at/near rim height (not strictly above)
  net_drop_margin_px: 8      # was 14 — net is close to rim in pixel space from top-down
  net_lane_radius_scale: 1.1 # was 0.8 — net opening appears as full circle from above
  net_confirm_frames: 1

  # --- Confidence scoring ---
  # Set use_confidence_scoring: false to fall back to the original AND logic.
  use_confidence_scoring: true
  make_threshold: 35       # inside_rim_zone(32) + above_rim_entry(5) = 37 > 35
  net_flow_threshold: 1.5  # mean optical flow magnitude in net ROI to trigger net signal
  min_tracking_frames: 10  # gate: frames ball must be tracked before a shot is counted
  min_travel_px: 80.0      # was 150 — top-down view compresses distance; close shots travel fewer px
  min_launch_velocity_px: 6.0   # lowered — threaded YOLO repeats positions, reducing apparent velocity
  launch_region_scale: 1.3      # reduced from 2.2 — rim appears large (314px) in close-mounted camera
  weights:
    above_rim_entry:   5   # was 20 — unreliable from top-down; ball rarely appears above rim_y
    inside_rim_zone:  32   # was 20 — best geometric signal from top-down (looking into rim circle)
    net_lane_passage: 40   # was 35 — primary make signal; downward motion check already in code
    net_optical_flow: 25   # was 20 — angle-independent; net moves on any make
    bounce_away:     -50   # unchanged — ball exiting rim zone quickly still indicates miss

calibration:
  court_width_ft: 50.0
  court_length_ft: 94.0
  # Reference points for court homography calibration.
  # Use any 4 clearly visible, non-collinear floor markings — do NOT use
  # baseline corners if they are out of frame (e.g. backboard-mount cameras).
  #
  # Coordinate system: x=0 at left sideline, x=50 at right sideline (facing
  # basket); y=0 at near baseline, y increases toward half court.
  # Basket center is at approximately x=25, y=5.25 on a standard court.
  #
  # High-school single-cam defaults (12ft lane, basket at y≈5.25):
  #   left near block  → (19, 8.25)   right near block → (31, 8.25)
  #   left elbow       → (19, 19.0)   right elbow      → (31, 19.0)
  reference_points:
    - label: "left near block (lane line, closest to basket)"
      world: [19.0, 8.25]
    - label: "right near block (lane line, closest to basket)"
      world: [31.0, 8.25]
    - label: "left elbow (free throw line meets lane line)"
      world: [19.0, 19.0]
    - label: "right elbow (free throw line meets lane line)"
      world: [31.0, 19.0]

runtime_calibration:
  rim_center_px: [640, 250]
  court_image_points:
    - [180, 640]
    - [1100, 640]
    - [820, 300]
    - [460, 300]
  wide_court_image_points:
    - [180, 640]
    - [1100, 640]
    - [820, 300]
    - [460, 300]

ui:
  player_store_path: output/players.json
  idle_timeout_sec: 600
  modes:
    - name: "Spot Up"
      end_trigger: "manual"
    - name: "Catch and Shoot"
      end_trigger: "timer"
      timer_sec: 300
    - name: "Game Shots"
      end_trigger: "manual"

runtime:
  backend: mock
  mock:
    shot_interval_sec: 2.2
    make_probability: 0.62
    location_jitter_ft: 2.0
    shot_zones_ft:
      - [25.0, 8.0]
      - [15.0, 18.0]
      - [35.0, 18.0]
      - [8.0, 22.0]
      - [42.0, 22.0]
      - [5.0, 6.0]
      - [45.0, 6.0]
      - [25.0, 28.0]
  dual_benchmark:
    duration_sec: 30
    report_interval_sec: 1.0
    rim_stride: 1
    wide_stride: 2
    use_detection: true

debug:
  show_overlay: true

output:
  session_dir: output
  shots_csv: shots.csv
  chart_png: shot_chart.png
  summary_json: summary.json

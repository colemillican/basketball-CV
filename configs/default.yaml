video:
  source: 0
  width: 1280
  height: 720
  fps: 60          # request MJPEG + 60fps from camera; use 120 if shooting at 640x480
  rim_source: 0
  rim_width: 1280
  rim_height: 720
  rim_fps: 60
  wide_source: 1
  wide_width: 1280
  wide_height: 720
  wide_fps: 60

detector:
  backend: yolo
  model_path: yolov8n.engine
  confidence: 0.25          # lowered for top-down view; YOLO not trained on this angle
  ball_class_ids: [32]
  max_detections: 3
  use_motion_mask: true     # BGS suppresses stationary objects (rim, floor markings)
  rim_exclusion_scale: 0.0  # disabled — motion mask handles static rim
  motion_overlap_threshold: 5.0   # lowered — small fast ball can fail at 10.0

tracking:
  max_distance_px: 80
  max_missed_frames: 20

shot_logic:
  # ── Core ──────────────────────────────────────────────────────────────────
  score_cooldown_frames: 45   # frames to suppress re-detection after each shot

  # ── Net-ROI pixel-diff threshold ──────────────────────────────────────────
  # Mean absolute pixel change inside the net interior circle.
  # Tune this first when setting up in a new gym.
  #   Still net baseline:  ~2–5
  #   Net sway (AC/fans):  ~5–9
  #   Ball through net:    ~10–30+
  # Raise if you get false makes from net sway; lower if real makes are missed.
  net_diff_threshold: 10.0

  # ── Zone geometry (all as multiples of the fitted rim_radius_px) ──────────
  # These are class-level defaults in shot_logic.py; listed here for reference.
  # To override them, add a Python subclass or edit the constants directly.
  #   OUTER_SCALE:   5.0   outer boundary of "in-play" zone
  #   HALO_SCALE:    1.8   committed zone (ball locked in on the rim)
  #   SCORING_SCALE: 1.05  inside the rim opening
  #   NET_ROI_SCALE: 0.72  net interior for pixel-diff sampling

  # ── Approach anti-false-positive gates ────────────────────────────────────
  #   MIN_APPROACH_FRAMES:  5    frames ball must be converging
  #   MIN_DISTANCE_CLOSED:  50   px ball must close toward rim
  #   CONVERGE_RATIO:       0.60 fraction of frames that must be converging

  # ── Make detection ─────────────────────────────────────────────────────────
  #   NET_DIFF_SPIKE_HOLD:  2    consecutive spike frames to confirm make
  #   DISAPPEAR_FRAMES:     5    frames absent inside scoring zone → make
  #   WAIT_OUT_TIMEOUT:     35   frames in wait_out before calling miss

  # ── Fallback (YOLO-dead) ───────────────────────────────────────────────────
  #   APPROACH_MEMORY_FRAMES:   90    remember approach for this many frames
  #   FALLBACK_DIFF_MULTIPLIER: 1.4   fallback needs 1.4× threshold (stricter)

calibration:
  court_width_ft: 50.0
  court_length_ft: 94.0
  # Reference points for court homography calibration.
  # Use any 4 clearly visible, non-collinear floor markings — do NOT use
  # baseline corners if they are out of frame (e.g. backboard-mount cameras).
  #
  # Coordinate system: x=0 at left sideline, x=50 at right sideline (facing
  # basket); y=0 at near baseline, y increases toward half court.
  # Basket center is at approximately x=25, y=5.25 on a standard court.
  #
  # High-school single-cam defaults (12ft lane, basket at y≈5.25):
  #   left near block  → (19, 8.25)   right near block → (31, 8.25)
  #   left elbow       → (19, 19.0)   right elbow      → (31, 19.0)
  reference_points:
    - label: "left near block (lane line, closest to basket)"
      world: [19.0, 8.25]
    - label: "right near block (lane line, closest to basket)"
      world: [31.0, 8.25]
    - label: "left elbow (free throw line meets lane line)"
      world: [19.0, 19.0]
    - label: "right elbow (free throw line meets lane line)"
      world: [31.0, 19.0]

runtime_calibration:
  rim_center_px: [640, 250]
  court_image_points:
    - [180, 640]
    - [1100, 640]
    - [820, 300]
    - [460, 300]
  wide_court_image_points:
    - [180, 640]
    - [1100, 640]
    - [820, 300]
    - [460, 300]

ui:
  player_store_path: output/players.json
  idle_timeout_sec: 600
  modes:
    - name: "Spot Up"
      end_trigger: "manual"
    - name: "Catch and Shoot"
      end_trigger: "timer"
      timer_sec: 300
    - name: "Game Shots"
      end_trigger: "manual"

runtime:
  backend: mock
  mock:
    shot_interval_sec: 2.2
    make_probability: 0.62
    location_jitter_ft: 2.0
    shot_zones_ft:
      - [25.0, 8.0]
      - [15.0, 18.0]
      - [35.0, 18.0]
      - [8.0, 22.0]
      - [42.0, 22.0]
      - [5.0, 6.0]
      - [45.0, 6.0]
      - [25.0, 28.0]
  dual_benchmark:
    duration_sec: 30
    report_interval_sec: 1.0
    rim_stride: 1
    wide_stride: 2
    use_detection: true

debug:
  show_overlay: true

output:
  session_dir: output
  shots_csv: shots.csv
  chart_png: shot_chart.png
  summary_json: summary.json
